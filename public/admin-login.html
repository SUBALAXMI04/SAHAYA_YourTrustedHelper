<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal - SAHAYA</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --royal-blue: #4169E1;
      --royal-blue-light: #5B7FED;
      --moonlight-light: #E0E6FF;
      --moonlight-dark: #D0D8F4;
      --error: #E74C3C;
      --text-dark: #333;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--royal-blue) 0%, var(--moonlight-light) 50%, var(--moonlight-dark) 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      box-shadow: 0 15px 50px rgba(65, 105, 225, 0.2);
      width: 100%;
      max-width: 450px;
      padding: 40px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: var(--royal-blue);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .logo-section {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      width: 60px;
      height: 60px;
      margin: 0 auto 15px;
      background: linear-gradient(135deg, var(--royal-blue) 0%, var(--royal-blue-light) 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      overflow: hidden;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-size: 28px;
      color: var(--text-dark);
      margin-bottom: 10px;
      font-weight: 700;
      text-align: center;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      text-align: center;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-dark);
      font-weight: 600;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s ease;
      outline: none;
      background: rgba(255, 255, 255, 0.8);
    }

    input:focus {
      border-color: var(--royal-blue);
      box-shadow: 0 0 0 3px rgba(65, 105, 225, 0.1);
      background: white;
    }

    input::placeholder {
      color: #999;
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--royal-blue);
      font-size: 18px;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      padding: 0;
      transition: opacity 0.2s ease;
    }

    .toggle-password:hover {
      opacity: 0.8;
    }

    .toggle-password svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--royal-blue) 0%, var(--royal-blue-light) 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 20px;
    }

    .btn-login:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(65, 105, 225, 0.3);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-message {
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid var(--error);
      color: var(--error);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      font-size: 14px;
    }

    .error-message.show {
      display: block;
    }

    .info-box {
      background: rgba(65, 105, 225, 0.1);
      border: 1px solid rgba(65, 105, 225, 0.3);
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
      color: var(--royal-blue);
      margin-top: 15px;
    }

    body.dark-mode {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }

    body.dark-mode .container {
      background: rgba(40, 40, 50, 0.95);
      color: #e0e0e0;
    }

    body.dark-mode h1,
    body.dark-mode label {
      color: #e0e0e0;
    }

    body.dark-mode input {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(65, 105, 225, 0.3);
      color: #e0e0e0;
    }

    body.dark-mode input::placeholder {
      color: #888;
    }
  </style>
</head>
<body class="light-mode">
  <div class="container">
    <a href="/landing.html" class="back-link" aria-label="Go back">←</a>
    
    <div class="logo-section">
      <div class="logo">
        <img src="LOGO.png" alt="SAHAYA Logo" onerror="this.parentElement.textContent='👑'">
      </div>
      <h1>Admin Portal</h1>
      <p class="subtitle">Platform management access</p>
    </div>

    <div class="error-message" id="errorMessage"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="password">Admin Password</label>
        <div class="password-wrapper">
          <input 
            type="password" 
            id="password" 
            placeholder="Enter admin password" 
            required
            autofocus
          >
          <span class="toggle-password" onclick="togglePassword()" aria-label="Show password">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </span>
        </div>
      </div>

      <button type="submit" class="btn-login">Access Admin Panel</button>

      <div class="info-box">
        ℹ️ This section is restricted to authorized administrators only.
      </div>
    </form>
  </div>

  <script src="auth-handler.js"></script>
  <script>
    // Keep the login page available so the browser Back button can return here if needed.
    document.addEventListener('DOMContentLoaded', function() {
      // No automatic redirect here; the admin panel will enforce access on its own.
    });

    function togglePassword() {
      const input = document.getElementById('password');
      const toggle = document.querySelector('.toggle-password');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      toggle.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
      toggle.innerHTML = isHidden
        ? `<svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 3l18 18"></path>
            <path d="M10.6 6.3A9.7 9.7 0 0 1 12 6c6.5 0 10 6 10 6a18.7 18.7 0 0 1-4.1 4.8"></path>
            <path d="M6.8 7.8A16.3 16.3 0 0 0 2 12s3.5 7 10 7c1.2 0 2.4-.2 3.5-.5"></path>
            <path d="M9.3 9.3A3 3 0 0 1 14.7 14.7"></path>
          </svg>`
        : `<svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>`;
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMessage');
      const button = this.querySelector('button');

      errorDiv.classList.remove('show');
      button.disabled = true;
      button.textContent = 'Verifying...';

      try {
        const response = await fetch('/auth/admin-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('userType', 'admin');
          localStorage.setItem('role', 'admin');
          localStorage.setItem('user', JSON.stringify(data.user || { role: 'admin' }));
          localStorage.setItem('adminName', data.user?.name || 'Administrator');
          localStorage.setItem('adminEmail', data.user?.email || 'admin@sahaya.local');
          
          window.location.href = '/admin-panel.html';
        } else {
          errorDiv.textContent = data.message || 'Access denied. Incorrect password.';
          errorDiv.classList.add('show');
        }
      } catch (error) {
        errorDiv.textContent = 'Network error. Please try again.';
        errorDiv.classList.add('show');
      } finally {
        button.disabled = false;
        button.textContent = 'Access Admin Panel';
      }
    });
  </script>
</body>
</html>
